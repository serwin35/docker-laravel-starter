# =============================================================================
# Docker Compose — BASE configuration
#
# Usage:
#   Dev:      docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#   Staging:  docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d
#   Prod:     docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Or use: make up | make up ENV=staging | make up ENV=prod
# =============================================================================

services:

  # ── Nginx ──────────────────────────────────────────────────────────────────
  nginx:
    build:
      context: .docker/nginx
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: ${APP_NAME:-laravel}_nginx
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./:/var/www/html:cached
    depends_on:
      php:
        condition: service_healthy
    networks:
      - laravel
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── PHP-FPM ────────────────────────────────────────────────────────────────
  php:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
      target: development
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: ${APP_NAME:-laravel}_php
    volumes:
      - ./:/var/www/html:cached
    env_file: .env
    networks:
      - laravel
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "php -r 'echo 1;' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── MySQL 8.4 ──────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: ${APP_NAME:-laravel}_mysql
    profiles: [mysql]
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_DATABASE:-laravel}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - ./.data/mysql:/var/lib/mysql
      - ./.docker/mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - laravel
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  pgsql:
    image: postgres:16-alpine
    container_name: ${APP_NAME:-laravel}_pgsql
    profiles: [pgsql]
    environment:
      POSTGRES_DB: ${DB_DATABASE:-laravel}
      POSTGRES_USER: ${DB_USERNAME:-laravel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./.data/pgsql:/var/lib/postgresql/data
      - ./.docker/pgsql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - laravel
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-laravel} -d ${DB_DATABASE:-laravel}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ${APP_NAME:-laravel}_redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redissecret}
      --save 60 1
      --loglevel warning
    volumes:
      - ./.data/redis:/data
    networks:
      - laravel
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redissecret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Queue worker ──────────────────────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
      target: development
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: ${APP_NAME:-laravel}_queue
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--timeout=90", "--max-time=3600"]
    volumes:
      - ./:/var/www/html:cached
    env_file: .env
    networks:
      - laravel
    restart: unless-stopped
    depends_on:
      php:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Laravel scheduler (cron) ──────────────────────────────────────────────
  scheduler:
    build:
      context: .docker/cron
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: ${APP_NAME:-laravel}_scheduler
    volumes:
      - ./:/var/www/html:cached
    env_file: .env
    networks:
      - laravel
    restart: unless-stopped
    depends_on:
      php:
        condition: service_healthy

  # ── One-shot helper: Composer ─────────────────────────────────────────────
  composer:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
      target: development
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: ${APP_NAME:-laravel}_composer
    working_dir: /var/www/html
    entrypoint: ["composer"]
    volumes:
      - ./:/var/www/html:cached
    networks:
      - laravel
    profiles: [tools]

  # ── One-shot helper: Artisan ──────────────────────────────────────────────
  artisan:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
      target: development
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: ${APP_NAME:-laravel}_artisan
    working_dir: /var/www/html
    entrypoint: ["php", "artisan"]
    volumes:
      - ./:/var/www/html:cached
    env_file: .env
    networks:
      - laravel
    profiles: [tools]

# ── Networks ──────────────────────────────────────────────────────────────────
# All data (MySQL, PostgreSQL, Redis, MinIO) is stored in .data/ on the host.
# This survives `docker compose down -v` and is easy to backup or wipe.
#
#   .data/
#   ├── mysql/    ← MySQL data directory
#   ├── pgsql/    ← PostgreSQL data directory
#   ├── redis/    ← Redis AOF/RDB persistence
#   └── minio/    ← MinIO object storage (dev only)
#
# To reset a single database: rm -rf .data/mysql && make up DB=mysql
# To full reset: rm -rf .data/          (keeps Laravel app intact)
networks:
  laravel:
    driver: bridge
