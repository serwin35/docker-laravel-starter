; ─── PHP-FPM pool configuration ───────────────────────────────────────────────
[www]
user  = laravel
group = laravel

listen = 0.0.0.0:9000

; Dynamic process management
pm                   = dynamic
pm.max_children      = 20
pm.start_servers     = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests      = 500

; Logging
access.log  = /proc/self/fd/2
slowlog     = /proc/self/fd/2
request_slowlog_timeout = 10s

; Pass env vars through to PHP
clear_env = no
