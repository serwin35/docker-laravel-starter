; ─── Development PHP configuration ───────────────────────────────────────────
[PHP]
file_uploads       = On
memory_limit       = 512M
upload_max_filesize = 100M
post_max_size      = 100M
max_execution_time = 600
max_input_time     = 600
max_file_uploads   = 50000
display_errors     = On
display_startup_errors = On
error_reporting    = E_ALL
log_errors         = On

[Date]
date.timezone = UTC

[Opcache]
; opcache off in dev — changes are reflected immediately
opcache.enable = 0
