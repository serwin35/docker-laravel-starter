# =============================================================================
# Nginx — Laravel SSL/HTTPS configuration
#
# Usage:
#   Dev  (self-signed): run scripts/gen-certs.sh then mount certs
#   Prod (Let's Encrypt): mount /etc/letsencrypt via volume
#
# Mount your certs in docker-compose:
#   volumes:
#     - ./.docker/nginx/certs:/etc/nginx/certs:ro
# =============================================================================

# Redirect all HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    root /var/www/html/public;
    index index.php;

    charset utf-8;
    client_max_body_size 100M;

    # ── TLS certificates ──────────────────────────────────────────────────────
    # Dev:  .docker/nginx/certs/self-signed.crt / self-signed.key
    # Prod: /etc/letsencrypt/live/yourdomain.com/fullchain.pem / privkey.pem
    ssl_certificate     /etc/nginx/certs/self-signed.crt;
    ssl_certificate_key /etc/nginx/certs/self-signed.key;

    # ── TLS hardening ─────────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # ── HSTS (enable only on prod, after testing) ─────────────────────────────
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;

    # ── Laravel health check ──────────────────────────────────────────────────
    location = /up {
        access_log off;
        try_files $uri /index.php?$query_string;
    }

    # ── Static asset caching ──────────────────────────────────────────────────
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|woff|woff2|ttf|svg|webp|avif)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
        try_files   $uri =404;
    }

    # ── Main Laravel router ───────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM ───────────────────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass        php:9000;
        fastcgi_index       index.php;
        fastcgi_buffers     16 16k;
        fastcgi_buffer_size 32k;
        include             fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;
        fastcgi_hide_header X-Powered-By;
    }

    # ── Block hidden files ────────────────────────────────────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # ── Let's Encrypt ACME challenge ──────────────────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;
}
